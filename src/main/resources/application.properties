# ═══════════════════════════════════════════════════════
# AI Recommendation Service — Configuration
# ═══════════════════════════════════════════════════════

# ── Application ─────────────────────────────────────────
quarkus.application.name=ai-recommendation-service
quarkus.application.version=1.0.0

# ── HTTP Server ─────────────────────────────────────────
quarkus.http.port=8084
quarkus.http.test-port=8086

# ── PostgreSQL ──────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:airline_user}
quarkus.datasource.password=${POSTGRES_PASSWORD:airline_pass_2024}
quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:airline_ops_db}?sslmode=require
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2

# ── Hibernate ───────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ── Kafka Consumer (impact_events) ──────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mp.messaging.incoming.impact-events-in.connector=smallrye-kafka
mp.messaging.incoming.impact-events-in.topic=impact_events
mp.messaging.incoming.impact-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.impact-events-in.group.id=ai-recommendation-group
mp.messaging.incoming.impact-events-in.auto.offset.reset=earliest

# ── Kafka Producer (recommendation_events) ──────────────
mp.messaging.outgoing.recommendation-events.connector=smallrye-kafka
mp.messaging.outgoing.recommendation-events.topic=recommendation_events
mp.messaging.outgoing.recommendation-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.recommendation-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer

# ── Redis ───────────────────────────────────────────────
quarkus.redis.hosts=redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
quarkus.redis.password=${REDIS_PASSWORD:airline_pass_2024}

# ── Groq AI ─────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant
groq.max.tokens=1024
groq.temperature=0.3

# ── Dev Services deshabilitados ──────────────────────────
quarkus.devservices.enabled=false
quarkus.redis.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.kafka.devservices.enabled=false

# ── OpenAPI ─────────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=AI Recommendation Service API
mp.openapi.extensions.smallrye.info.version=1.0.0

# ── Logging ─────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.airline".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n

# ── Dev Profile ─────────────────────────────────────────
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.level=DEBUG

# ── Kafka SASL/SSL para Upstash ──────────────────────────
kafka.security.protocol=SASL_SSL
kafka.sasl.mechanism=SCRAM-SHA-256
kafka.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";

mp.messaging.connector.smallrye-kafka.security.protocol=SASL_SSL
mp.messaging.connector.smallrye-kafka.sasl.mechanism=SCRAM-SHA-256
mp.messaging.connector.smallrye-kafka.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";

quarkus.http.cors=true
quarkus.http.cors.origins=https://airline-platform.vercel.app
quarkus.http.cors.methods=GET,POST,PATCH,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept